<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico?v=1">
    <title>Toán 9 | Ôn Thi Vào 10</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* ================= THEME VARIABLES (MATH BLUE EDITION) ================= */
        :root {
            --bg-color: #f0f4f8; 
            --header-bg: rgba(255, 255, 255, 0.9);
            --primary-blue: #1a73e8; 
            --soft-blue: #e3f2fd;
            --card-bg: #ffffff;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --accent-math: #ef4444; 
            --border: #e2e8f0;
            --font-main: 'Be Vietnam Pro', system-ui, -apple-system, sans-serif;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a; 
            --header-bg: rgba(15, 23, 42, 0.95);
            --primary-blue: #38bdf8;
            --soft-blue: #1e293b;
            --card-bg: #1e293b;
            --text-dark: #f1f5f9;
            --text-light: #94a3b8;
            --accent-math: #fb7185;
            --border: #334155;
        }

        /* ================= GENERAL SETUP ================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            background-color: var(--bg-color);
            background-image: linear-gradient(var(--soft-blue) 1px, transparent 1px),
                              linear-gradient(90deg, var(--soft-blue) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--text-dark);
            font-family: var(--font-main);
            line-height: 1.6;
        }

        header {
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--header-bg);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            border-bottom: 3px solid var(--primary-blue);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary-blue);
            display: flex;
            align-items: center;
            gap: 14px;
            font-family: var(--font-main);
        }

        .logo-img {
            width: 65px;
            height: 65px;
            object-fit: cover;
            border-radius: 12px;
            background: white;
            padding: 4px;
            border: 2px solid var(--primary-blue);
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .theme-switch {
            background: var(--soft-blue);
            border: 2px solid var(--primary-blue);
            color: var(--primary-blue);
            padding: 8px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-size: 14px;
            font-family: var(--font-main);
            white-space: nowrap;
        }

        .theme-switch:hover {
            opacity: 0.8;
            transform: translateY(-2px);
        }

        /* ================= HERO & SEARCH ================= */
        .hero { padding: 40px 5% 20px; text-align: center; }
        .hero h1 { 
            font-size: 2.8rem; 
            color: var(--primary-blue); 
            margin-bottom: 10px; 
            font-family: var(--font-main);
            font-weight: 800;
            line-height: 1.2;
        }
        
        .search-container { max-width: 600px; margin: 20px auto; }
        .search-box {
            width: 100%; padding: 15px 25px; border: 2px solid var(--border);
            border-radius: 12px; background: var(--card-bg); color: var(--text-dark); outline: none;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            font-family: var(--font-main);
        }

        /* ================= CARDS GRID ================= */
        main { padding: 10px 5% 80px; max-width: 1200px; margin: 0 auto; }
        .cards-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
        }

        .math-card {
            text-decoration: none; color: inherit; background: var(--card-bg);
            border-radius: 15px; padding: 25px; border: 1px solid var(--border);
            display: flex; flex-direction: column; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden;
        }

        .math-card::before {
            content: "π"; position: absolute; right: -10px; top: -10px; font-size: 5rem;
            color: var(--soft-blue); opacity: 0.3; font-weight: bold;
        }

        .math-card:hover { 
            transform: translateY(-8px); 
            border-color: var(--primary-blue); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); 
        }

        .card-emoji { font-size: 2.2rem; margin-bottom: 15px; }
        .card-title { font-size: 1.05rem; font-weight: 700; color: var(--primary-blue); margin-bottom: 10px; }
        .card-desc { font-size: 0.9rem; color: var(--text-light); margin-bottom: 15px; flex-grow: 1; }
        .card-meta { font-size: 0.85rem; font-weight: 600; color: var(--accent-math); border-top: 1px dashed var(--border); padding-top: 12px; }

        footer { text-align: center; padding: 40px 20px; background: var(--header-bg); border-top: 1px solid var(--border); }
        .author { color: var(--primary-blue); font-weight: 800; font-size: 1.1rem; margin-top: 5px; display: block; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <img src="images/logo.png?v=1" alt="Logo Toán" class="logo-img">
        <span>Toán 9 - Ôn Thi Vào 10</span>
    </div>

    <div class="header-actions">
        <a href="https://forms.gle/3EFuhxNX2c9X64mt5" target="_blank" class="theme-switch">
            <span>⚠️</span>
            <span>Báo Lỗi</span>
        </a>

        <button class="theme-switch" id="theme-toggle">
            <span id="theme-icon">🌙</span>
            <span id="theme-text">Chế độ tối</span>
        </button>
    </div>
</header>

    <section class="hero">
        <h1>Toán 9 - Ôn Thi Vào 10 📐</h1>
        <div class="search-container">
            <input type="text" class="search-box" id="search-input" placeholder="Tìm kiếm trong 13 bộ tài liệu... 🔍">
        </div>
    </section>

    <main>
        <div class="cards-grid" id="cards-container"></div>
    </main>

    <footer>
        <p>Hệ thống lưu trữ tài liệu ôn tập Toán 9 & Luyện thi vào 10 ✏️</p>
        <span class="author">Created by HwLongg🔥</span>
    </footer>

    <script>
        const cardData = [
            { emoji: "📘", title: "Sách Toán 9 Tập 1 KNTT", url: "https://drive.google.com/file/d/10Q0tS8Ja-jwjD37H88mF3mAMzsEL8Uk-/view", desc: "Sách giáo khoa Kết nối tri thức với cuộc sống - Tập 1." },
            { emoji: "📗", title: "Sách Toán 9 Tập 2 KNTT", url: "https://drive.google.com/file/d/1qdrC-vaBLFLI39rL6d39UyYOEk9Wuupk/view", desc: "Sách giáo khoa Kết nối tri thức với cuộc sống - Tập 2." },
            { emoji: "📝", title: "Tự Học Toán 9 (Ver1)", url: "https://drive.google.com/file/d/1XFnYJhLh9HyfzYHSrtD45pVE6MldvfdK/view", desc: "Tài liệu tự học môn Toán 9 của tác giả Nguyễn Chín Em (Tập 1)." },
            { emoji: "🖋️", title: "Tự Học Toán 9 (Ver2)", url: "https://drive.google.com/file/d/1y7Ue0VhNpjRTPyGomjQW0gJ0hzo5i4u8/view", desc: "Tài liệu tự học môn Toán 9 của tác giả Nguyễn Chín Em (Tập 2)." },
            { emoji: "📚", title: "Tự Học Toán 9 (Ver3)", url: "https://drive.google.com/file/d/1yy6UZYs-BcYiJP0wkUMKSHOilJykK9P_/view", desc: "Tài liệu tự học môn Toán 9 - Phiên bản nâng cao kiến thức." },
            { emoji: "📓", title: "SBT (Tập 1) Toán 9", url: "https://tailieumontoan.com/download-bai-tap-toan-lop-9-tap-1-1534/", desc: "Sách bài tập bổ trợ nâng cao kỹ năng giải toán tập 1." },
            { emoji: "📖", title: "SBT (Tập 2) Toán 9", url: "https://drive.google.com/file/d/1QL3UcnndeRQGHv_q76vZ8cuS1x0oCzfh/view", desc: "Sách bài tập Toán 9 Tập 2 bổ sung kiến thức." },
            { emoji: "🔢", title: "SBT (Thêm) Toán 9", url: "https://drive.google.com/file/d/1POhui5iDgZoHIp73OxPqprGUjivh4_IH/view", desc: "Các dạng bài tập bám sát chương trình mới KNTT (Đã đổi tên)." },
            { emoji: "📐", title: "Các Đề GHK1 Toán 9", url: "https://thcs.toanmath.com/de-thi-giua-hk1-toan-9", desc: "Tổng hợp các đề thi giữa học kỳ 1 từ nhiều nguồn." },
            { emoji: "📏", title: "Các Đề CHK1 Toán 9", url: "https://thcs.toanmath.com/de-thi-hk1-toan-9", desc: "Bộ sưu tập đề thi cuối học kỳ 1 chọn lọc." },
            { emoji: "📐", title: "Các Đề GHK2 Toán 9", url: "https://thcs.toanmath.com/de-thi-giua-hk2-toan-9", desc: "Tổng hợp các đề thi giữa học kỳ 2 cập nhật mới." },
            { emoji: "📏", title: "Các Đề CHK2 Toán 9", url: "https://thcs.toanmath.com/de-thi-hk2-toan-9", desc: "Bộ sưu tập đề thi cuối học kỳ 2 (Ôn thi học kỳ)." },
            { emoji: "🎓", title: "100 Đề Minh Hoạ Vào 10", url: "https://drive.google.com/drive/folders/1279yJPNo5SpDHGXkkj1NaF8YwrU_N06e", desc: "Kho dữ liệu 100 đề minh hoạ ôn thi tuyển sinh lớp 10 cực lớn." }
        ];

        const container = document.getElementById('cards-container');
        cardData.forEach(data => {
            const card = document.createElement('a');
            card.href = data.url;
            card.target = "_blank";
            card.className = "math-card";
            card.innerHTML = `
                <span class="card-emoji">${data.emoji}</span>
                <div class="card-title">${data.title}</div>
                <div class="card-desc">${data.desc}</div>
                <div class="card-meta">Xem tài liệu ➜</div>
            `;
            container.appendChild(card);
        });

        // Theme Toggle Logic
        const toggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const themeText = document.getElementById('theme-text');

        toggleBtn.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme');
            if (theme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                themeIcon.innerText = '🌙';
                themeText.innerText = 'Chế độ tối';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeIcon.innerText = '☀️';
                themeText.innerText = 'Chế độ sáng';
            }
        });

        // Search Logic
        document.getElementById('search-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.math-card').forEach(card => {
                card.style.display = card.textContent.toLowerCase().includes(term) ? 'flex' : 'none';
            });
        });
    </script>
</body>
</html>
